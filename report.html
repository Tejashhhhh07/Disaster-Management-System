<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Report Incident</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
</head>

<body>

    <header>

        <div class="logo">
            <i class="fa-solid fa-shield"></i>
            <h2>DisasterCare</h2>
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="alerts.html">Alerts</a>
            <a href="report.html">Report</a>
            <a href="guidelines.html">Guidelines</a>
            <a href="contact.html">Contact</a>
        </nav>

    </header>

    <section class="about">

        <h2>Report an Incident</h2>

        <p>
            Fill in the details below to report a disaster or emergency
            situation. This page is for demonstration purposes only.
        </p>

    </section>

    <section class="about">

        <form>

            <input type="text" placeholder="Full Name" required>

            <br>

            <input type="email" placeholder="Email Address" required>

            <br>

            <input type="tel" placeholder="Phone Number" required>

            <br>

            <input type="text" placeholder="Location" required>

            <br>

            <select required>
                <option value="">Select Disaster Type</option>
                <option>Flood</option>
                <option>Earthquake</option>
                <option>Fire</option>
                <option>Cyclone</option>
                <option>Heatwave</option>
                <option>Landslide</option>
            </select>

            <br>

            <input type="date" required>

            <br>

            <textarea rows="6" placeholder="Describe the incident..." required></textarea>

            <br>

            <button class="btn" type="submit">Submit Report</button>

        </form>

    </section>

    <footer>

        <p>© 2026 Disaster Management System. All Rights Reserved.</p>

    </footer>

    <script src="script.js"></script>

</body>

</html>
